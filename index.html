<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
 body {
    margin: 0;
    background: url("wood.jpeg");
    background-size: cover;      /* fills entire screen */
    background-position: center; /* centers the plank texture */
    background-repeat: no-repeat;
    position: relative;
    width: 1536px;
    height: 749px;
    overflow: hidden;
}

  .zone {
    overflow: hidden;
    position: absolute;
    padding: 12px;
    box-sizing: border-box;

    border: 30px solid transparent;
    border-image: url("Frame.png") 100 round;

    box-shadow:
      inset 0 0 20px rgba(0,0,0,0.6),
      0 0 25px rgba(0,0,0,0.7);

    border-radius: 6px;
  }

  /* Fade‑in slideshow images */
  .zone img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;   /* Fills the frame with NO empty space */
    opacity: 0;
    transition: opacity 1s ease-in-out;
}


  .zone img.active {
    opacity: 1;
  }

  /* Pixel‑based frame layout for 1536 × 749 viewport */

  /* z1: Large center anchor */
  /* CENTER ANCHOR */
.frame1 {
  width: 360px;
  height: 260px;
  left: 540px;   /* moved left slightly */
  top: 260px;    /* moved down slightly */
}

/* ABOVE LEFT */
.frame2 {
  width: 260px;
  height: 190px;
  left: 360px;   /* moved left */
  top: 80px;     /* moved up slightly */
}

/* ABOVE RIGHT */
.frame3 {
  width: 260px;
  height: 190px;
  left: 820px;   /* moved right */
  top: 80px;
}

/* BELOW LEFT */
.frame4 {
  width: 240px;
  height: 180px;
  left: 360px;   /* moved left */
  top: 540px;    /* moved down */
}

/* BELOW RIGHT */
.frame5 {
  width: 240px;
  height: 180px;
  left: 820px;   /* moved right */
  top: 540px;
}

/* LEFT MID */
.frame6 {
  width: 210px;
  height: 230px;
  left: 180px;   /* moved left */
  top: 300px;    /* moved down */
}

/* RIGHT MID */
.frame7 {
  width: 210px;
  height: 230px;
  left: 1050px;  /* moved right */
  top: 300px;
}

/* UPPER LEFT SMALL */
.frame8 {
  width: 190px;
  height: 160px;
  left: 140px;   /* moved left */
  top: 5px;     /* moved up */
}

/* UPPER RIGHT SMALL */
.frame9 {
  width: 190px;
  height: 160px;
  left: 1100px;  /* moved right */
  top: 5px
}

/* LOWER CENTER SMALL */
.frame10 {
  width: 200px;
  height: 150px;
  left: 620px;   /* centered better */
  top: 580px;    /* moved down */
}

/* FAR LEFT ACCENT */
.frame11 {
  width: 150px;
  height: 130px;
  left: 60px;    /* moved left */
  top: 165px;    /* moved down */
}

/* FAR RIGHT ACCENT */
.frame12 {
  width: 150px;

  left: 1230px;  /* moved right */
  top: 165px;
}

/* LOWER RIGHT ACCENT */
.frame13 {
  width: 140px;
  height: 120px;
  left: 1100px;  /* moved right */

}

/* LOWER LEFT ACCENT */

</style>

<body>

<div class="zone frame1"  id="z1"></div>
<div class="zone frame2"  id="z2"></div>

<div class="zone frame14" id="z14"></div>

<script>
/* SIMPLE IMAGE LOADER (Samsung‑safe, no async/await) */
function loadImages(path, prefix, start, end, callback) {
  var exts = ["jpg", "jpeg", "png"];
  var found = [];
  var totalChecks = (end - start + 1) * exts.length;
  var completedChecks = 0;

  function checkDone() {
    completedChecks++;
    if (completedChecks >= totalChecks) {
      callback(found);
    }
  }

  for (var i = start; i <= end; i++) {
    (function(i) {
      var matched = false;
      for (var e = 0; e < exts.length; e++) {
        (function(ext) {
          var url = path + "/" + prefix + i + "." + ext;
          var img = new Image();
          img.onload = function() {
            if (!matched) {
              matched = true;
              found.push(url);
            }
            checkDone();
          };
          img.onerror = function() {
            checkDone();
          };
          img.src = url;
        })(exts[e]);
      }
    })(i);
  }
}

/* Fade‑in slideshow */
function startSlideshow(zoneId, images, interval) {
  if (!images || images.length === 0) return;

  var index = 0;
  var zone = document.getElementById(zoneId);

  for (var i = 0; i < images.length; i++) {
    var img = document.createElement("img");
    img.src = images[i];
    zone.appendChild(img);
  }

  var imgElements = zone.querySelectorAll("img");

  function showNext() {
    for (var j = 0; j < imgElements.length; j++) {
      imgElements[j].classList.toggle("active", j === index);
    }
    index = (index + 1) % images.length;
  }

  showNext();
  setInterval(showNext, interval);
}

/* LOAD 14 GALLERIES → 14 FRAMES */
function init() {
  var total = 14;
  var loaded = 0;

  function loadGallery(n) {
    loadImages("slides/gallery" + n, "image", 0, 50, function(imgs) {
      startSlideshow("z" + n, imgs, 8000 + (n * 500));
      loaded++;
    });
  }

  for (var i = 1; i <= total; i++) {
    loadGallery(i);
  }
}

init();
</script>

</body>
</html>
